<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>LeetCode Problem 2</title>
</head>
<body>
    <h1>LeetCode 2: Find First Occurrence</h1>
    <p>Right-click, click <strong>Inspect</strong>, and open the <strong>Console</strong> tab to see the output.</p>

    <script>
        function strStr(haystack, needle) {
            return haystack.indexOf(needle);
        }

        console.log("Index of 'sad' in 'sadbutsad': " + strStr("sadbutsad", "sad"));
        console.log("Index of 'leeto' in 'leetcode': " + strStr("leetcode", "leeto"));
        console.log("Index of 'world' in 'helloworld': " + strStr("helloworld", "world"));
    </script>
</body>
</html>
